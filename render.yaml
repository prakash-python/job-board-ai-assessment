services:
  - type: web
    name: job-board-backend
    autoDeploy: true
    runtime: python
    buildCommand: cd backend && python manage.py migrate
    startCommand: cd backend && gunicorn core.wsgi:application --timeout 120 --workers 4 --worker-class sync --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DEBUG
        value: false
